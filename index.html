<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Sweet Kitchen | Sæta eldhúsið</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(to bottom,#ffe4ec,#ffffff);
color:#333;
}

header{
background:black;
color:white;
padding:20px;
text-align:center;
}

h1{
color:#ff69b4;
margin:0;
}

.hero{
text-align:center;
padding:60px 20px;
}

.buttons button{
margin:10px;
padding:15px 30px;
border:none;
border-radius:30px;
background:black;
color:white;
font-size:16px;
}

.section{
padding:40px 20px;
text-align:center;
}

.menu, .form-box{
background:white;
max-width:700px;
margin:20px auto;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.gallery img{
width:280px;
border-radius:15px;
margin:10px;
}

.highlight{
background:#ffe4ec;
padding:15px;
border-radius:12px;
margin-top:15px;
}

.floating-btn{
position:fixed;
bottom:20px;
right:20px;
background:#ff69b4;
color:white;
padding:15px 20px;
border-radius:50px;
font-weight:bold;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

footer{
background:black;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>

<script>
function switchLang(lang){
localStorage.setItem("lang", lang);

const t = {
en:{
hero:"Custom cakes in Reykjanesbær",
order:"Order Now",
menu:"MENU & PRICES"
},
is:{
hero:"Sérsniðnar kökur í Reykjanesbæ",
order:"Panta núna",
menu:"MATSEÐILL & VERÐ"
}
}[lang];

document.getElementById("hero-text").innerText=t.hero;
document.getElementById("menu-title").innerText=t.menu;
document.getElementById("order-btn").innerText=t.order;
}

window.onload=function(){
let lang=localStorage.getItem("lang")|| (navigator.language.startsWith("is")?"is":"en");
switchLang(lang);
}
</script>

</head>

<body>

<header>
<h1>The Sweet Kitchen</h1>
<p>Sæta eldhúsið</p>

<button onclick="switchLang('en')">🇬🇧</button>
<button onclick="switchLang('is')">🇮🇸</button>
</header>

<div class="hero">
<h2 id="hero-text">Custom cakes in Reykjanesbær</h2>

<div class="buttons">
<a href="https://instagram.com/thesweetkitchenis">
<button>Instagram</button>
</a>

<a href="https://www.facebook.com/share/16pxDonsms/?mibextid=wwXIfr">
<button>Messenger</button>
</a>
</div>
</div>

<div class="section">
<h2>Our Cakes</h2>

<div class="gallery">
<img src="cake1.jpg">
<img src="cake2.jpg">
<img src="cake3.jpg">
</div>
</div>

<div class="menu">
<h2 id="menu-title">MENU & PRICES</h2>

<p><strong>CAKES</strong></p>
<p>4” 2 layers – 5.000 ISK</p>
<p>6” 3 layers – 10.000 ISK</p>

<div class="highlight">
✨ Special Frosting (+30%)
</div>

</div>

<div class="form-box">
<h2>Order Form</h2>

<form name="cake-order" method="POST" data-netlify="true">
<input type="hidden" name="form-name" value="cake-order">

<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email" required>

<textarea placeholder="Cake details"></textarea>

<button id="order-btn" type="submit">Order Now</button>
</form>
</div>

<div class="section">
<h2>Location</h2>

<iframe 
src="https://maps.google.com/maps?q=Reykjanesbær&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%" height="300" style="border:0;border-radius:15px;">
</iframe>
</div>

<a href="#top" class="floating-btn">Order</a>

<footer>
<p>Reykjanesbær, Iceland</p>
<p>thesweetkitchenis@gmail.com</p>
</footer>

</body>
</html>
